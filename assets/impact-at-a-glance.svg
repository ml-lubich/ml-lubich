<svg xmlns="http://www.w3.org/2000/svg" width="980" height="168" viewBox="0 0 980 168" role="img" aria-label="Impact at a Glance  Misha Lubich">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071428"/>
      <stop offset="45%" stop-color="#0A1F44"/>
      <stop offset="100%" stop-color="#123B7A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E5FD9"/>
      <stop offset="100%" stop-color="#39A7FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#39A7FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39A7FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="980" height="168" rx="22" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="977" height="165" rx="20.5" fill="none" stroke="url(#accent)" stroke-opacity="0.55"/>
  <ellipse cx="820" cy="-10" rx="180" ry="90" fill="url(#glow)"/>
  <ellipse cx="120" cy="180" rx="160" ry="70" fill="url(#glow)" opacity="0.55"/>

  <text x="36" y="38" fill="#8FB9FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="700" letter-spacing="2.2">IMPACT AT A GLANCE</text>
  <text x="36" y="62" fill="#E6EDF3" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="15" font-weight="500">Production AI shipped at real scale  Claude · MCP · multi-agent</text>

  <!-- metric cards -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif">
    <g transform="translate(28,82)">
      <rect width="178" height="66" rx="14" fill="#081A36" stroke="#1E5FD9" stroke-opacity="0.45"/>
      <text x="18" y="28" fill="#39A7FF" font-size="22" font-weight="800">100M+</text>
      <text x="18" y="50" fill="#9FB3C8" font-size="12" font-weight="600">users impacted</text>
    </g>
    <g transform="translate(218,82)">
      <rect width="178" height="66" rx="14" fill="#081A36" stroke="#1E5FD9" stroke-opacity="0.45"/>
      <text x="18" y="28" fill="#39A7FF" font-size="22" font-weight="800">6</text>
      <text x="18" y="50" fill="#9FB3C8" font-size="12" font-weight="600">research papers</text>
    </g>
    <g transform="translate(408,82)">
      <rect width="178" height="66" rx="14" fill="#081A36" stroke="#1E5FD9" stroke-opacity="0.45"/>
      <text x="18" y="28" fill="#39A7FF" font-size="20" font-weight="800">ex-Apple</text>
      <text x="18" y="50" fill="#9FB3C8" font-size="12" font-weight="600">CoreOS · File Systems</text>
    </g>
    <g transform="translate(598,82)">
      <rect width="178" height="66" rx="14" fill="#081A36" stroke="#1E5FD9" stroke-opacity="0.45"/>
      <text x="18" y="28" fill="#39A7FF" font-size="20" font-weight="800">Berkeley</text>
      <text x="18" y="50" fill="#9FB3C8" font-size="12" font-weight="600">UC Berkeley CS</text>
    </g>
    <g transform="translate(788,82)">
      <rect width="164" height="66" rx="14" fill="#081A36" stroke="#39A7FF" stroke-opacity="0.55"/>
      <text x="16" y="28" fill="#39A7FF" font-size="18" font-weight="800">Claude+</text>
      <text x="16" y="50" fill="#9FB3C8" font-size="12" font-weight="600">MCP · Agents · Cloud</text>
    </g>
  </g>
</svg>
