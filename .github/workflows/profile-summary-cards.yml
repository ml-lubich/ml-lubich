name: GitHub-Profile-Summary-Cards

# Refresh static Profile Summary SVGs. Uses the public card API when available,
# with a local fallback for productive-time so the README never shows Vercel's
# "Cards are temporarily rate limited" ERROR card.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    name: bake-static-summary-cards
    steps:
      - uses: actions/checkout@v4

      - name: Bake summary cards
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/bake-summary-cards.sh
          ./scripts/bake-summary-cards.sh

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh profile summary cards"
            git push
          else
            echo "No card changes"
          fi
